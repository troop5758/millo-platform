<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Millo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 340px;
      width: 100%;
    }
    .icon {
      width: 72px; height: 72px;
      border-radius: 24px;
      background: #1e1e2e;
      border: 1px solid #2e2e3e;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p  { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 13px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again. Some pages you've visited are available offline.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
