# Millo 3.0 — CI/CD. Lint, test, build, Docker image, production deploy (zero-downtime).
# https://milloapp.com
name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_staging_smoke:
        description: 'Run staging smoke checks after CI jobs'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  NODE_VERSION: '20'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: node scripts/lint.js
        name: Lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run validate:bootstrap
      - run: npm run validate:schemas
      - run: npm run validate:phase3
      - run: npm run validate:phase4
      - run: npm run validate:phase5
      - run: npm run validate:phase5.5
      - run: npm run validate:phase5.6
      - run: npm run validate:phase7
      - run: npm run validate:phase8
      - run: npm run validate:phase10
      - run: npm run validate:phase11
      - run: npm run validate:phase12
      - run: npm run validate:phase13
      - run: npm run validate:phase14
      - run: npm run validate:phase15
      - run: npm run validate:phase16
      - run: npm run validate:phase17
      - run: npm run validate:phase18
        name: Test (validations)
      - run: npx vitest run
        name: Unit tests (API + web via root vitest.config)

  go-live-gate:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run go-live-gate
        name: Focused go-live gate (schemas + phase9 + phase20)

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, go-live-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        name: Build
      - name: Upload web dist (CI-built static; rsync on deploy)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist/
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:e2e:install
      - run: npm run test:e2e
        env:
          CI: true

  security-scan:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Start API stack for OWASP scan
        run: |
          cp .env.example .env 2>/dev/null || true
          echo "JWT_SECRET=test-secret-for-owasp-scan-$(date +%s)" >> .env
          docker compose up -d mongo redis api
      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && echo " API ready" && exit 0
            sleep 2
          done
          echo "API did not become ready"
          exit 1
      - name: Run OWASP ZAP scan
        run: bash scripts/security/owasp-scan.sh http://localhost:3000
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: scripts/security/reports/
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Docker image build
        run: |
          VERSION=$(node -p "require('./package.json').version")
          docker build -t millo-api:latest -t millo-api:$VERSION -t millo-api:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: [docker, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download web dist from build job
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist
      - name: Tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ github.run_number }}
          git push origin --tags
      - name: Rsync static web (CI artifact → server)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_WEB_PATH: ${{ secrets.DEPLOY_WEB_PATH }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "Skip rsync: set secrets DEPLOY_HOST and DEPLOY_SSH_KEY for git-based static deploy."
            exit 0
          fi
          USER="${DEPLOY_USER:-ubuntu}"
          WEB_PATH="${DEPLOY_WEB_PATH:-/var/www/millo/web}"
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -av --delete -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            web-dist/ "${USER}@${DEPLOY_HOST}:${WEB_PATH}/"
          rm -f ~/.ssh/deploy_key
      - name: Git pull + rolling restart (API / workers)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "Skip SSH: DEPLOY_HOST or DEPLOY_SSH_KEY not set."
            exit 0
          fi
          USER="${DEPLOY_USER:-ubuntu}"
          PATH_DEPLOY="${DEPLOY_PATH:-/var/www/millo}"
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "${USER}@${DEPLOY_HOST}" \
            "cd ${PATH_DEPLOY} && git pull && bash infra/rolling-restart.sh"
          rm -f ~/.ssh/deploy_key

  staging-smoke:
    runs-on: ubuntu-latest
    needs: [go-live-gate]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_staging_smoke == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run staging smoke checks
        env:
          BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          ADMIN_TOKEN: ${{ secrets.STAGING_ADMIN_TOKEN }}
          USER_TOKEN: ${{ secrets.STAGING_USER_TOKEN }}
          EXPECT_PAYMENTS_DISABLED: ${{ secrets.STAGING_EXPECT_PAYMENTS_DISABLED }}
          EXPECT_PAYOUTS_DISABLED: ${{ secrets.STAGING_EXPECT_PAYOUTS_DISABLED }}
          EXPECT_KYC_DISABLED: ${{ secrets.STAGING_EXPECT_KYC_DISABLED }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$ADMIN_TOKEN" ]; then
            echo "Missing required secrets STAGING_BASE_URL / STAGING_ADMIN_TOKEN"
            exit 1
          fi
          mkdir -p artifacts
          set +e
          npm run staging:smoke 2>&1 | tee artifacts/staging-smoke.log
          SMOKE_EXIT=${PIPESTATUS[0]}
          set -e
          echo "staging_smoke_exit=$SMOKE_EXIT" | tee -a artifacts/staging-smoke.log
          exit $SMOKE_EXIT
      - name: Upload staging smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-report
          path: artifacts/staging-smoke.log
          retention-days: 14
