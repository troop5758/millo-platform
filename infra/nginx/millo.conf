# Millo — minimal nginx (HTTP). SPA + API split.
# Production TLS/HSTS/rate limits: use ../nginx.conf after certbot (see tls-letsencrypt.sh).
# Upstream: Fastify defaults to 127.0.0.1:3000. If your process uses 5000, set:
#   server 127.0.0.1:5000;
# https://milloapp.com

upstream millo_api_upstream {
    server 127.0.0.1:3000;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# CORS: browser calls from web origin → api.milloapp.com (credentials + JSON).
map $http_origin $cors_origin {
    default "";
    "~^https://milloapp\.com$"           $http_origin;
    "~^https://www\.milloapp\.com$"     $http_origin;
    "~^http://localhost(:[0-9]+)?$"    $http_origin;
    "~^http://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
}

server {
    listen 80;
    listen [::]:80;
    server_name milloapp.com www.milloapp.com;

    root /var/www/millo/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/millo-web.access.log;
    error_log  /var/log/nginx/millo-web.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.milloapp.com;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Session-Events" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://millo_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;

        # Reflect allowed browser origins only (see map). App may also set CORS — hide to avoid duplicates.
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
    }

    access_log /var/log/nginx/millo-api.access.log;
    error_log  /var/log/nginx/millo-api.error.log;
}
