worker_processes auto;
events { worker_connections 1024; }

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record all;
      record_path /recordings;
      record_suffix -%Y%m%d-%H%M%S.flv;
      record_unique on;

      # HLS packaging
      hls on;
      hls_path /tmp/hls;
      hls_fragment 2s;
      hls_playlist_length 30s;
      hls_nested on;       # creates /tmp/hls/<streamKey>/index.m3u8

      # Multi-bitrate ladder via FFmpeg (uncomment to enable)
      # exec_push ffmpeg -i rtmp://localhost:1935/live/$name
      #   -c:v libx264 -b:v 2500k -s 1280x720 -c:a aac -b:a 128k
      #   -f hls -hls_time 2 -hls_list_size 15 /tmp/hls/$name/720p/index.m3u8
      #   -c:v libx264 -b:v 800k -s 640x360  -c:a aac -b:a 96k
      #   -f hls -hls_time 2 -hls_list_size 15 /tmp/hls/$name/360p/index.m3u8 2>/dev/null;

      # Webhook: notify API when stream starts (validate stream key, update DB)
      on_publish http://localhost:8081/hooks/on_publish;

      # Webhook: notify API when stream ends (trigger recording URL update)
      on_done    http://localhost:8081/hooks/on_done;
    }
  }
}

http {
  sendfile on;

  server {
    listen 80;

    # HLS delivery
    location /live/ {
      alias /tmp/hls/;

      # CORS
      add_header 'Access-Control-Allow-Origin'  '*'    always;
      add_header 'Access-Control-Allow-Methods' 'GET'  always;
      add_header 'Cache-Control'                'no-cache';

      types {
        application/vnd.apple.mpegurl  m3u8;
        video/mp2t                     ts;
      }
    }

    # Recordings (post-stream VOD)
    location /recordings/ {
      alias /recordings/;
      add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Healthcheck
    location /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }

  # Webhook receiver (internal — receives on_publish / on_done from nginx-rtmp)
  server {
    listen 8081;

    location /hooks/on_publish {
      default_type 'application/json';
      content_by_lua_block {
        -- Forward to Millo API to verify stream key
        local http = require "resty.http"
        local httpc = http.new()
        local res, err = httpc:request_uri(os.getenv("API_BASE") .. "/live/ingest/on_publish", {
          method  = "POST",
          headers = { ["Content-Type"] = "application/x-www-form-urlencoded" },
          body    = ngx.req.get_body_data() or "",
        })
        if not res or res.status ~= 200 then
          ngx.status = 403
          ngx.say('{"error":"forbidden"}')
        else
          ngx.status = 200
          ngx.say('{"ok":true}')
        end
      }
    }

    location /hooks/on_done {
      default_type 'application/json';
      # Forward to API to mark stream ended and set recording URL
      proxy_pass ${API_BASE}/live/ingest/on_done;
      proxy_set_header Content-Type application/x-www-form-urlencoded;
    }
  }
}
