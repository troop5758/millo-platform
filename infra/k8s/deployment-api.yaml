apiVersion: apps/v1
kind: Deployment
metadata:
  name: millo-api
  namespace: millo
  labels:
    app: millo-api
spec:
  replicas: 6
  selector:
    matchLabels:
      app: millo-api
  template:
    metadata:
      labels:
        app: millo-api
    spec:
      containers:
        - name: api
          image: millo/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: millo-config
            - secretRef:
                name: millo-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              value: "redis://redis:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: millo-api
  namespace: millo
spec:
  selector:
    app: millo-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
    - name: api
      port: 3000
      targetPort: 3000
  type: ClusterIP
