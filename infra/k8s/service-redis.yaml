apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: millo
  labels:
    app: redis
spec:
  # Headless service required for StatefulSet stable network identities (redis-0.redis, redis-1.redis, ...)
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: redis-bus
      port: 16379
      targetPort: 16379
  selector:
    app: redis
