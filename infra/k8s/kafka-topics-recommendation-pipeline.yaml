# Strimzi KafkaTopic — discovery / recommendation event stream
# Apply after Kafka cluster (e.g. kafka-strimzi.yaml). Namespace must match cluster.
# Each resource uses metadata.name as K8s ID; Kafka topic name = spec.topicName (dots allowed).
# Tune partitions/replicas for your cluster (replicas <= broker count).
# https://milloapp.com

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: feed-impression
  namespace: millo
  labels:
    strimzi.io/cluster: millo-kafka
spec:
  topicName: feed.impression
  partitions: 6
  replicas: 3
---
