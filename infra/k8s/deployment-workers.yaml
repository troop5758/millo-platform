apiVersion: apps/v1
kind: Deployment
metadata:
  name: millo-workers
  namespace: millo
  labels:
    app: millo-workers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: millo-workers
  template:
    metadata:
      labels:
        app: millo-workers
    spec:
      containers:
        - name: workers
          image: millo/workers:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: millo-config
            - secretRef:
                name: millo-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: millo-workers
  namespace: millo
spec:
  selector:
    app: millo-workers
  ports: []
  type: ClusterIP
