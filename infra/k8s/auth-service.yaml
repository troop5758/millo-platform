apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: millo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: docker.io/library/millo-auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: millo
spec:
  selector:
    app: auth-service
  ports:
  - port: 5001
    targetPort: 5001
