apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: millo-api-hpa
  namespace: millo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: millo-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
