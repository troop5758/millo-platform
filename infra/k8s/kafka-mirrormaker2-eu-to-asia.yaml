# Strimzi KafkaMirrorMaker2 — EU -> ASIA (topics + consumer groups)
# Phase 4 / Part 4 — Cross-Region Replication
#
# Deploy this in the ASIA Kubernetes cluster.
# Update `bootstrapServers` fields to point at the EU/ASIA Strimzi bootstrap services.

apiVersion: kafka.strimzi.io/v1
kind: KafkaMirrorMaker2
metadata:
  name: mm2-eu-to-asia
  namespace: millo
spec:
  version: 4.2.0
  replicas: 1
  target:
    alias: asia
    bootstrapServers: asia-kafka-bootstrap:9092
    groupId: mm2-eu-to-asia-group
    configStorageTopic: mm2-eu-to-asia-config
    offsetStorageTopic: mm2-eu-to-asia-offset
    statusStorageTopic: mm2-eu-to-asia-status
  mirrors:
    - source:
        alias: eu
        bootstrapServers: eu-kafka-bootstrap:9092
      topicsPattern: ".*"
      groupsPattern: ".*"
      sourceConnector:
        tasksMax: 1
        config:
          replication.factor: -1
          offset-syncs.topic.replication.factor: -1
          sync.topic.acls.enabled: "false"
          refresh.topics.interval.seconds: 600
      checkpointConnector:
        tasksMax: 1
        config:
          checkpoints.topic.replication.factor: -1
          sync.group.offsets.enabled: "false"
          refresh.groups.interval.seconds: 600

