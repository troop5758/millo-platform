# NGINX — Millo 3.0. Initial config (HTTP only). Use until TLS certs exist, then replace with nginx.conf.
# Bind: milloapp.com, api.milloapp.com, cdn.milloapp.com

upstream millo_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ACME challenge for Let's Encrypt (certbot)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name milloapp.com www.milloapp.com api.milloapp.com cdn.milloapp.com;
    root /var/www/certbot;
    location /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }
    location / {
        proxy_pass http://millo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
