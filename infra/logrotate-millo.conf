# Log rotation for Millo (PM2 and app logs). https://milloapp.com
# Install: sudo cp infra/logrotate-millo.conf /etc/logrotate.d/millo
# Adjust paths to match your deploy (e.g. /var/www/millo, ~/.pm2/logs).

/var/log/millo*.log
/var/www/millo/logs/*.log
/root/.pm2/logs/*.log
{
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
