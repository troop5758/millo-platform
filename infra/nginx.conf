# NGINX — Millo 3.0. Ubuntu 22.04. TLS, HSTS, DDoS limits.
# Bind: https://milloapp.com, api.milloapp.com, cdn.milloapp.com

limit_req_zone $binary_remote_addr zone=millo_api_limit:10m rate=30r/s;
# Stricter bucket for auth, KYC, and coin purchase endpoints (abuse / credential stuffing).
limit_req_zone $binary_remote_addr zone=millo_api_sensitive:10m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=millo_conn:10m;

upstream millo_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name milloapp.com www.milloapp.com api.milloapp.com cdn.milloapp.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# milloapp.com — main site (web app). HSTS.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name milloapp.com www.milloapp.com;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # SPA CSP — align with @millo/security CSP_DEFAULT (Sentry ingest + API).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.milloapp.com wss://api.milloapp.com https://*.ingest.sentry.io https://*.ingest.de.sentry.io https://*.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), payment=(self)" always;
    ssl_certificate /etc/letsencrypt/live/milloapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/milloapp.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    root /var/www/millo/web;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# api.milloapp.com — API (Fastify). HSTS, DDoS rate/conn limits.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.milloapp.com;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    ssl_certificate /etc/letsencrypt/live/milloapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/milloapp.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    limit_req zone=millo_api_limit burst=50 nodelay;
    limit_conn millo_conn 20;

    location ~* ^/(auth/|payments/(coin|coins|kyc|payouts)/) {
        limit_req zone=millo_api_sensitive burst=15 nodelay;
        limit_conn millo_conn 10;
        proxy_pass http://millo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://millo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# cdn.milloapp.com — static/CDN (S3-backed or local)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cdn.milloapp.com;

    ssl_certificate /etc/letsencrypt/live/milloapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/milloapp.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /var/www/millo/cdn;
    location / {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri $uri/ =404;
    }
}
